<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تعديل المنتجات</title>

<style>

body{
background:#2b2b2b;
color:white;
direction:rtl;
font-family:Arial;
padding:20px;
margin:0;
}

h2{
text-align:center;
color:red;
margin-bottom:10px;
}

.products{
display:grid;
grid-template-columns: repeat(2,1fr);
gap:15px;
}

.product{
background:#3a3a3a;
padding:10px;
border-radius:10px;
border:2px solid red;
text-align:center;
}

.product img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
margin-bottom:5px;
}

input,select{
width:95%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
background:red;
color:white;
border:none;
padding:10px;
border-radius:8px;
cursor:pointer;
margin-top:5px;
width:100%;
}

</style>

<script>

let products=[];

window.onload=function(){

products =
JSON.parse(localStorage.getItem("products")) || [];

displayProducts();

};

function displayProducts(){

let container =
document.getElementById("productsContainer");

container.innerHTML="";

products.forEach((product,index)=>{

let price = product.price ? product.price : "";

let div=document.createElement("div");
div.className="product";

div.innerHTML=`

<img src="${product.image}">

<input id="name${index}" value="${product.name}">

<!-- 🔥 خانة السعر -->
<input
type="number"
id="price${index}"
value="${price}"
placeholder="💰 السعر">

<select id="system${index}">
<option>${product.system}</option>
</select>

<button onclick="updateProduct(${index})">
✏️ تعديل المنتج
</button>

<button onclick="deleteProduct(${index})">
🗑️ حذف المنتج
</button>

`;

container.appendChild(div);

});

}

function updateProduct(index){

let newName =
document.getElementById("name"+index).value;

let newPrice =
document.getElementById("price"+index).value;

if(newPrice===""){
alert("أدخل السعر");
return;
}

products[index].name = newName;
products[index].price = newPrice;

localStorage.setItem(
"products",
JSON.stringify(products)
);

alert("تم التعديل ✅");

displayProducts();

}

function deleteProduct(index){

products.splice(index,1);

localStorage.setItem(
"products",
JSON.stringify(products)
);

displayProducts();

}

</script>

</head>

<body>

<h2>✏️ تعديل المنتجات</h2>

<div id="productsContainer" class="products"></div>

</body>
</html>
